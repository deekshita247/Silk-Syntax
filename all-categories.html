<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>All Categories — Fix-It Forward</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="products.js"></script>
  <script src="header.js"></script>
  <style>
    .cats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:40px 6vw 80px;}
    .cat-card{text-decoration:none;color:var(--color-text);background:var(--color-surface);border:1px solid var(--color-border-subtle);border-radius:var(--radius-lg);overflow:hidden;transition:transform .25s,box-shadow .25s;display:flex;flex-direction:column;}
    .cat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);}
    .cat-card__banner{height:160px;display:flex;align-items:center;justify-content:center;font-size:4rem;}
    .cat-card__body{padding:18px;flex:1;}
    .cat-card__name{font-family:var(--font-display);font-size:1.3rem;font-weight:600;margin:0 0 4px;}
    .cat-card__count{font-size:.78rem;color:var(--color-text-muted);margin-bottom:6px;}
    .cat-card__desc{font-size:.82rem;color:var(--color-text-muted);margin:0 0 14px;line-height:1.5;}
    .cat-card__cta{font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text);}
    @media(max-width:900px){.cats-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:540px){.cats-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<script>injectHeader("");</script>
<div style="background:var(--color-velvet);padding:40px 6vw 32px;text-align:center;">
  <h1 style="font-family:var(--font-display);font-size:clamp(2rem,5vw,3.2rem);color:#fff;margin:0 0 8px;">All Categories</h1>
  <p style="color:rgba(255,255,255,.6);">Everything you need, in one place.</p>
</div>
<main>
  <div class="cats-grid" id="cats-grid"></div>
</main>
<script>
  var META = {
    "Electronics":{ icon:"🖥️", bg:"https://i.ibb.co/8D4Yb2Dz/360-F-309670293-nvb-HEe-Qf-S6-Ul1-U4f6v-Wd-JHUXKFHz-HEOv.jpg", desc:"Gadgets, audio, accessories & more" },
    "Kitchen":    { icon:"🍳", bg:"https://i.ibb.co/8D4Yb2Dz/360-F-309670293-nvb-HEe-Qf-S6-Ul1-U4f6v-Wd-JHUXKFHz-HEOv.jpg", desc:"Tools for every home cook" },
    "Make Up":    { icon:"💄", bg:"https://i.ibb.co/8D4Yb2Dz/360-F-309670293-nvb-HEe-Qf-S6-Ul1-U4f6v-Wd-JHUXKFHz-HEOv.jpg", desc:"Beauty, skincare & cosmetics" },
    "Womens":{ icon:"👗", bg:"https://i.ibb.co/8D4Yb2Dz/360-F-309670293-nvb-HEe-Qf-S6-Ul1-U4f6v-Wd-JHUXKFHz-HEOv.jpg", desc:"Dresses, tops, jeans & more" },
    "Mens":    { icon:"👔", bg:"https://i.ibb.co/8D4Yb2Dz/360-F-309670293-nvb-HEe-Qf-S6-Ul1-U4f6v-Wd-JHUXKFHz-HEOv.jpg", desc:"Shirts, blazers, outerwear & more" },
    "Kids":     { icon:"🧒", bg:"https://i.ibb.co/8D4Yb2Dz/360-F-309670293-nvb-HEe-Qf-S6-Ul1-U4f6v-Wd-JHUXKFHz-HEOv.jpg", desc:"Fun & comfy clothes for little ones" },
    "Accessories":{ icon:"👜", bg:"https://i.ibb.co/8D4Yb2Dz/360-F-309670293-nvb-HEe-Qf-S6-Ul1-U4f6v-Wd-JHUXKFHz-HEOv.jpg", desc:"Complete your look" },
    "Fitness":    { icon:"💪", bg:"https://i.ibb.co/8D4Yb2Dz/360-F-309670293-nvb-HEe-Qf-S6-Ul1-U4f6v-Wd-JHUXKFHz-HEOv.jpg", desc:"Gear up and get moving" }
  };
  var seen = {}, cats = [];
  products.forEach(function(p){ if(!seen[p.category]){ seen[p.category]=true; cats.push(p.category); } });
  var grid = document.getElementById("cats-grid");
  cats.forEach(function(cat){
    var m = META[cat]||{icon:"🛍️",bg:"#F5F5F5",desc:""};
    var n = products.filter(function(p){ return p.category===cat; }).length;
    var a = document.createElement("a"); a.href="category.html?cat="+encodeURIComponent(cat); a.className="cat-card";
    a.innerHTML='<div class="cat-card__banner" style="background-image:url("'+m.bg+'");background-size:cover;background-position:center;"></div>'+
      '<div class="cat-card__body"><h2 class="cat-card__name">'+cat+'</h2><p class="cat-card__count">'+n+' products</p><p class="cat-card__desc">'+m.desc+'</p><span class="cat-card__cta">Shop Now →</span></div>';
    grid.appendChild(a);
  });
  injectFooter();
</script>
</body>
</html>
