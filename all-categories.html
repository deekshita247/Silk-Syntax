<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>All Categories — Fix-It Forward</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .page-hero {
      background: var(--color-velvet);
      padding: 48px 6vw 40px;
      text-align: center;
    }
    .page-hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem,5vw,3.5rem);
      color:#fff;margin:0 0 10px;font-weight:600;
    }
    .page-hero p { color:rgba(255,255,255,.6);margin:0;font-size:.95rem; }

    .categories-page { padding: 48px 6vw 80px; }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .cat-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
      text-decoration: none;
      color: var(--color-text);
      transition: box-shadow .25s, transform .25s;
      display: flex;
      flex-direction: column;
    }
    .cat-card:hover {
      box-shadow: 0 12px 40px rgba(34,45,82,.14);
      transform: translateY(-4px);
    }

    .cat-card__banner {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      position: relative;
      overflow: hidden;
    }

    .cat-card__body {
      padding: 20px;
      flex:1;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .cat-card__name {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--color-velvet);
      margin:0;
    }

    .cat-card__count {
      font-size: .8rem;
      color: var(--color-text-muted);
    }

    .cat-card__cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .8rem;
      font-weight: 600;
      color: var(--color-velvet);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-top: 10px;
    }

    @media(max-width:900px) { .categories-grid{ grid-template-columns:repeat(2,1fr); } }
    @media(max-width:540px) { .categories-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
<script src="products.js"></script>
<script src="header.js"></script>
<script>
  document.title = "All Categories — Fix-It Forward";
  injectHeader("");
</script>

<div class="page-hero">
  <h1>Shop All Categories</h1>
  <p>Everything you need, in one place.</p>
</div>

<main class="categories-page">
  <div class="categories-grid" id="categories-grid"></div>
</main>

<script>
  const CATEGORY_META = {
    "Electronics": { icon:"🖥️", color:"#EEF2FF", desc:"Gadgets, audio, accessories & more" },
    "Kitchen":     { icon:"🍳", color:"#FFF7ED", desc:"Tools and essentials for every home cook" },
    "Make Up":     { icon:"💄", color:"#FDF2F8", desc:"Beauty, skincare & cosmetics" },
    "Clothes":     { icon:"👗", color:"#F0FDF4", desc:"Fashion for every occasion" },
    "Accessories": { icon:"👜", color:"#FFFBEB", desc:"Complete your look" },
    "Fitness":     { icon:"💪", color:"#EFF6FF", desc:"Gear up and get moving" },
  };

  const grid = document.getElementById("categories-grid");
  const categories = [...new Set(products.map(p => p.category))];

  categories.forEach(cat => {
    const meta  = CATEGORY_META[cat] || { icon:"🛍️", color:"#F5F5F5", desc:"" };
    const count = products.filter(p => p.category === cat).length;
    const card  = document.createElement("a");
    card.href   = `category.html?cat=${encodeURIComponent(cat)}`;
    card.className = "cat-card";
    card.innerHTML = `
      <div class="cat-card__banner" style="background:${meta.color};">
        <span style="font-size:4.5rem;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1));">${meta.icon}</span>
      </div>
      <div class="cat-card__body">
        <h2 class="cat-card__name">${cat}</h2>
        <p class="cat-card__count">${count} products</p>
        <p style="font-size:.82rem;color:var(--color-text-muted);margin:0;">${meta.desc}</p>
        <span class="cat-card__cta">Shop Now →</span>
      </div>`;
    grid.appendChild(card);
  });

  injectFooter();
</script>
</body>
</html>
