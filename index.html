<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fix-It Forward Shop</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<script src="products.js"></script>
<script src="header.js"></script>
<script> injectHeader(""); </script>

<main>

  <!-- ── HERO ── -->
  <section id="hero" class="hero" aria-labelledby="hero-title">
    <div class="hero__content">
      <h1 id="hero-title">Style Meets<br/>Substance.</h1>
      <p>
        Curated collections across fashion, beauty, electronics
        and lifestyle — everything you need, beautifully presented.
      </p>
      <div style="display:flex;gap:12px;flex-wrap:wrap;">
        <button class="btn btn--primary" data-scroll-target="#catalog"
          style="background:var(--color-champagne);border-color:var(--color-champagne);color:var(--color-velvet);">
          Shop Now
        </button>
        <a href="all-categories.html" class="btn btn--secondary"
          style="border-color:rgba(255,255,255,.45);color:#fff;text-decoration:none;">
          View All
        </a>
      </div>
    </div>

    <div class="hero__highlight" aria-hidden="true">
      <p style="font-family:var(--font-display);font-size:.9rem;letter-spacing:.1em;
        text-transform:uppercase;color:var(--color-text-muted);margin-bottom:16px;">
        Shop by Category
      </p>
      <div class="hero-categories">
        <a class="hero-cat-tile" href="category.html?cat=Clothes">
          <span class="hero-cat-tile__icon">👗</span>Clothing
        </a>
        <a class="hero-cat-tile" href="category.html?cat=Make Up">
          <span class="hero-cat-tile__icon">💄</span>Beauty
        </a>
        <a class="hero-cat-tile" href="category.html?cat=Electronics">
          <span class="hero-cat-tile__icon">🖥️</span>Electronics
        </a>
        <a class="hero-cat-tile" href="category.html?cat=Accessories">
          <span class="hero-cat-tile__icon">👜</span>Accessories
        </a>
        <a class="hero-cat-tile" href="category.html?cat=Fitness">
          <span class="hero-cat-tile__icon">💪</span>Sports
        </a>
        <a class="hero-cat-tile" href="category.html?cat=Kitchen">
          <span class="hero-cat-tile__icon">🍳</span>Kitchen
        </a>
      </div>
    </div>
  </section>

  <!-- ── CATALOG ── -->
  <section id="catalog" class="catalog" aria-label="Product list">
    <header class="catalog__header">
      <h2>Featured Items</h2>
      <div class="catalog__filters">
        <label>
          Sort by
          <select id="sort-select">
            <option value="recommended">Recommended</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
          </select>
        </label>
        <label>
          <span class="visually-hidden">Search products</span>
          <input id="search-input-mobile" type="search" placeholder="Search…" autocomplete="off"/>
        </label>
      </div>
    </header>

    <div class="catalog__grid" id="product-grid"></div>

    <!-- Original template — untouched -->
    <template id="product-card-template">
      <article class="product" data-product-id="">
        <button class="product__favorite" aria-pressed="false" aria-label="Save product">♡</button>
        <div class="product__image-wrapper">
          <img class="product__image" alt="" loading="lazy"/>
        </div>
        <div class="product__body">
          <h3 class="product__title"></h3>
          <p class="product__description"></p>
          <div class="product__pricing">
            <span class="product__price"></span>
            <span class="product__price--compare"></span>
          </div>
          <div class="product__stock" aria-live="polite"></div>
          <div class="product__actions">
            <label class="product__qty-label">
              Qty
              <input class="product__qty-input" type="number" min="1" max="9" step="1" value="1"/>
            </label>
            <button class="btn btn--primary product__add">Add to Bag</button>
          </div>
        </div>
      </article>
    </template>
  </section>

</main>

<script src="app.js"></script>
<script> injectFooter(); </script>

</body>
</html>
