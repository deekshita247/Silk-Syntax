<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Shop — Fix-It Forward</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="products.js"></script>
  <script src="header.js"></script>
  <style>
    .page-hero{background:var(--color-velvet);padding:40px 6vw 32px;}
    [data-theme="dark"] .page-hero{background:#0a0d14;}
    .page-hero h1{font-family:var(--font-display);font-size:clamp(2rem,5vw,3rem);color:#fff;margin:0 0 6px;}
    .page-hero p{color:rgba(255,255,255,.6);margin:0;font-size:.9rem;}
    .breadcrumb{padding:12px 6vw;font-size:.78rem;color:var(--color-text-muted);}
    .breadcrumb a{color:var(--color-text-muted);text-decoration:none;}
    .breadcrumb a:hover{color:var(--color-text);}
    .catalog{padding:24px 6vw 60px;}
    .catalog__header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--color-border-subtle);flex-wrap:wrap;gap:10px;}
    .catalog__header h2{font-family:var(--font-display);font-size:1.4rem;color:var(--color-text);margin:0;}
    .catalog__filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
    .catalog__filters select,.catalog__filters input[type="search"]{background:var(--color-surface);border:1px solid var(--color-border-subtle);border-radius:var(--radius-pill);color:var(--color-text);padding:7px 14px;font-size:.82rem;font-family:var(--font-body);outline:none;}
    .results-count{font-size:.8rem;color:var(--color-text-muted);margin-bottom:16px;}
    .cat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;}
    .prod-card{text-decoration:none;color:var(--color-text);background:var(--color-surface);border:1px solid var(--color-border-subtle);border-radius:var(--radius-md);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-card);transition:transform .25s,box-shadow .25s;position:relative;}
    .prod-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover);}
    .prod-card__img{aspect-ratio:1/1;overflow:hidden;background:var(--color-marble);}
    .prod-card__img img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
    .prod-card:hover .prod-card__img img{transform:scale(1.06);}
    .prod-card__body{padding:12px;display:flex;flex-direction:column;gap:4px;flex:1;}
    .prod-card__title{font-size:.86rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .prod-card__desc{font-size:.72rem;color:var(--color-text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .prod-card__badge{position:absolute;top:8px;left:8px;background:#e05252;color:#fff;font-size:.6rem;font-weight:700;padding:3px 7px;border-radius:99px;text-transform:uppercase;z-index:1;}
    .prod-card__fav{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;border:1px solid var(--color-border-subtle);background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;z-index:1;transition:all .18s;}
    .prod-card__fav:hover,.prod-card__fav.active{color:#e05252;border-color:#e05252;background:#fff0f0;}
    .filter-sidebar{background:var(--color-surface);border:1px solid var(--color-border-subtle);border-radius:var(--radius-lg);padding:20px;position:sticky;top:100px;}
    .filter-sidebar h3{font-family:var(--font-display);font-size:1.1rem;margin:0 0 16px;color:var(--color-text);}
    .filter-group{margin-bottom:18px;}
    .filter-group__title{font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:8px;font-weight:600;display:block;}
    .filter-option{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.84rem;color:var(--color-text);}
    .filter-option input{accent-color:var(--color-champagne);}
    .filter-clear{background:none;border:none;font-size:.75rem;color:var(--color-champagne);cursor:pointer;padding:0;text-decoration:underline;margin-top:8px;font-family:var(--font-body);display:block;}
    .empty-state{grid-column:1/-1;text-align:center;padding:60px 0;}
    .catalog-layout{display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:start;}
    @media(max-width:900px){
      .catalog-layout{grid-template-columns:1fr!important;}
      .filter-sidebar{display:none;position:static;}
      .filter-sidebar.show{display:block;}
      .mobile-filter-btn{display:inline-flex!important;}
      .cat-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
    }
    @media(max-width:480px){.cat-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}}
  </style>
</head>
<body>
<script>
  var params    = new URLSearchParams(window.location.search);
  var catParam  = params.get("cat") || "All";
  var qParam    = params.get("q")   || "";
  var isNew     = catParam === "new";
  var catName   = isNew ? "All" : catParam;
  var pageTitle = isNew ? "New In" : (catParam === "All" ? "All Products" : catParam);
  document.title = pageTitle + " — Fix-It Forward";
  injectHeader(catParam);
</script>

<div class="breadcrumb"><a href="index.html">Home</a> &rsaquo; <span id="bc-cat"></span></div>
<div class="page-hero"><h1 id="pg-title"></h1><p id="pg-sub"></p></div>

<main>
  <div class="catalog">
    <header class="catalog__header">
      <h2 id="cat-heading">Products</h2>
      <div class="catalog__filters">
        <button class="btn btn--secondary" id="mobile-filter-btn"
          style="font-size:.78rem;padding:7px 14px;display:none;"
          onclick="document.getElementById('filter-sidebar').classList.toggle('show')">
          Filters
        </button>
        <label style="font-size:.82rem;color:var(--color-text-muted);">Sort by
          <select id="sort-select">
            <option value="recommended">Recommended</option>
            <option value="price-asc">Price: Low to High</option>
            <option value="price-desc">Price: High to Low</option>
            <option value="rating">Top Rated</option>
          </select>
        </label>
        <input id="search-input-cat" type="search" placeholder="Search..."/>
      </div>
    </header>

    <p class="results-count" id="results-count"></p>

    <div class="catalog-layout">
      <div class="filter-sidebar" id="filter-sidebar"></div>
      <div><div class="cat-grid" id="product-grid"></div></div>
    </div>
  </div>

  <div id="rv-section" style="display:none;">
    <div class="recently-viewed">
      <h3>Recently Viewed</h3>
      <div class="rv-scroll" id="rv-container"></div>
    </div>
  </div>
</main>

<script>
  // ── Page labels ──────────────────────────────────────────────
  document.getElementById("bc-cat").textContent      = pageTitle;
  document.getElementById("pg-title").textContent    = pageTitle;
  document.getElementById("cat-heading").textContent = pageTitle;
  document.getElementById("pg-sub").textContent = isNew
    ? "The latest arrivals just dropped."
    : "Explore our " + pageTitle + " collection.";
  if (qParam) document.getElementById("search-input-cat").value = qParam;

  // ── Build filter sidebar ─────────────────────────────────────
  var sidebar = document.getElementById("filter-sidebar");

  // Heading
  var fh = document.createElement("h3");
  fh.textContent = "Filters";
  sidebar.appendChild(fh);

  // ── Price filter: simple checkboxes (no slider) ──────────────
  var sym = currentRegion.symbol;
  var r   = currentRegion.rate;
  var priceRanges = [
    { label: "Under " + sym + " " + Math.round(50*r),   min: 0,   max: 50   },
    { label: sym+" "+Math.round(50*r)+" – "+sym+" "+Math.round(100*r), min: 50,  max: 100  },
    { label: sym+" "+Math.round(100*r)+" – "+sym+" "+Math.round(150*r),min: 100, max: 150  },
    { label: "Over " + sym + " " + Math.round(150*r),   min: 150, max: 99999 }
  ];

  var fpg = document.createElement("div"); fpg.className = "filter-group";
  var fpt = document.createElement("span"); fpt.className = "filter-group__title"; fpt.textContent = "Price Range";
  fpg.appendChild(fpt);

  priceRanges.forEach(function(range){
    var lbl = document.createElement("label"); lbl.className = "filter-option";
    var cb  = document.createElement("input");
    cb.type = "checkbox";
    cb.className = "price-filter";
    cb.setAttribute("data-min", String(range.min));
    cb.setAttribute("data-max", String(range.max));
    cb.addEventListener("change", applyFilters);
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(" " + range.label));
    fpg.appendChild(lbl);
  });
  sidebar.appendChild(fpg);

  // ── Size filter ──────────────────────────────────────────────
  var sizeCats = ["Womens", "Mens", "Kids", "Fitness", "All"];
  if (sizeCats.indexOf(catName) !== -1) {
    var sg = document.createElement("div"); sg.className = "filter-group";
    var st = document.createElement("span"); st.className = "filter-group__title"; st.textContent = "Size";
    sg.appendChild(st);
    ["XS","S","M","L","XL","XXL"].forEach(function(s){
      var lbl = document.createElement("label"); lbl.className = "filter-option";
      var cb  = document.createElement("input"); cb.type = "checkbox"; cb.className = "size-filter"; cb.value = s;
      cb.addEventListener("change", applyFilters);
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(" " + s));
      sg.appendChild(lbl);
    });
    sidebar.appendChild(sg);
  }

  // ── Rating filter ────────────────────────────────────────────
  var rg = document.createElement("div"); rg.className = "filter-group";
  var rt = document.createElement("span"); rt.className = "filter-group__title"; rt.textContent = "Rating";
  rg.appendChild(rt);
  [4, 3, 2].forEach(function(star){
    var lbl = document.createElement("label"); lbl.className = "filter-option";
    var rb  = document.createElement("input"); rb.type = "radio"; rb.name = "rating-filter"; rb.value = String(star);
    rb.addEventListener("change", applyFilters);
    lbl.appendChild(rb);
    lbl.appendChild(document.createTextNode(" " + "★".repeat(star) + " & up"));
    rg.appendChild(lbl);
  });
  var la = document.createElement("label"); la.className = "filter-option";
  var ra = document.createElement("input"); ra.type = "radio"; ra.name = "rating-filter"; ra.value = "0"; ra.checked = true;
  ra.addEventListener("change", applyFilters);
  la.appendChild(ra);
  la.appendChild(document.createTextNode(" All ratings"));
  rg.appendChild(la);
  sidebar.appendChild(rg);

  // ── Clear button ─────────────────────────────────────────────
  var clrBtn = document.createElement("button");
  clrBtn.className = "filter-clear";
  clrBtn.textContent = "Clear all filters";
  clrBtn.addEventListener("click", clearFilters);
  sidebar.appendChild(clrBtn);

  // ── Stars helper ─────────────────────────────────────────────
  function starsHTML(rating){
    var full  = Math.floor(rating);
    var half  = rating % 1 >= 0.5 ? 1 : 0;
    var empty = 5 - full - half;
    return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(empty);
  }

  // ── Apply filters ────────────────────────────────────────────
  function applyFilters(){
    var query     = (document.getElementById("search-input-cat").value || "").toLowerCase().trim();
    var sort      = document.getElementById("sort-select").value;
    var minRating = parseFloat(
      (document.querySelector("input[name='rating-filter']:checked") || { value: "0" }).value
    );

    // Collect checked price ranges
    var checkedPrices = [];
    document.querySelectorAll(".price-filter:checked").forEach(function(cb){
      checkedPrices.push({
        min: parseFloat(cb.getAttribute("data-min")),
        max: parseFloat(cb.getAttribute("data-max"))
      });
    });

    // Collect checked sizes
    var selSizes = [];
    document.querySelectorAll(".size-filter:checked").forEach(function(cb){
      selSizes.push(cb.value);
    });

    var list = products.filter(function(p){
      // Category
      if (catName !== "All" && p.category !== catName) return false;

      // Search
      if (query &&
          p.name.toLowerCase().indexOf(query) === -1 &&
          p.description.toLowerCase().indexOf(query) === -1) return false;

      // Price — if none checked, show all; if any checked, product must fit at least one range
      if (checkedPrices.length > 0) {
        var priceOk = false;
        for (var i = 0; i < checkedPrices.length; i++) {
          if (p.price >= checkedPrices[i].min && p.price < checkedPrices[i].max) {
            priceOk = true;
            break;
          }
        }
        if (!priceOk) return false;
      }

      // Rating
      if (p.rating < minRating) return false;

      // Size — if none checked OR product has no sizes, skip size check
      if (selSizes.length > 0 && p.sizes && p.sizes.length > 0) {
        var sizeOk = false;
        for (var j = 0; j < selSizes.length; j++) {
          if (p.sizes.indexOf(selSizes[j]) !== -1) { sizeOk = true; break; }
        }
        if (!sizeOk) return false;
      }

      return true;
    });

    if (sort === "price-asc")  list.sort(function(a,b){ return a.price - b.price; });
    if (sort === "price-desc") list.sort(function(a,b){ return b.price - a.price; });
    if (sort === "rating")     list.sort(function(a,b){ return b.rating - a.rating; });

    renderGrid(list);
  }

  // ── Render grid ──────────────────────────────────────────────
  function renderGrid(list){
    var grid = document.getElementById("product-grid");
    var cnt  = document.getElementById("results-count");
    grid.innerHTML = "";
    cnt.textContent = list.length + " product" + (list.length !== 1 ? "s" : "") + " found";

    if (!list.length) {
      var em = document.createElement("div"); em.className = "empty-state";
      em.innerHTML = "<p style='font-size:2rem;margin-bottom:10px;'>&#128269;</p>" +
                     "<p style='color:var(--color-text-muted);font-size:.9rem;'>No products match your filters.</p>";
      var cb2 = document.createElement("button"); cb2.className = "btn btn--secondary";
      cb2.style.marginTop = "14px"; cb2.textContent = "Clear Filters";
      cb2.addEventListener("click", clearFilters);
      em.appendChild(cb2);
      grid.appendChild(em);
      return;
    }

    list.forEach(function(p){
      var discPct = p.comparePrice ? Math.round((1 - p.price / p.comparePrice) * 100) : 0;
      var favs    = JSON.parse(localStorage.getItem("fif_favs") || "[]");
      var isFav   = favs.indexOf(p.id) !== -1;

      var card = document.createElement("a");
      card.href = "product.html?id=" + p.id;
      card.className = "prod-card";

      if (discPct) {
        var bdg = document.createElement("span"); bdg.className = "prod-card__badge";
        bdg.textContent = "-" + discPct + "%"; card.appendChild(bdg);
      }

      var favBtn = document.createElement("button");
      favBtn.className   = "prod-card__fav" + (isFav ? " active" : "");
      favBtn.textContent = isFav ? "♥" : "♡";
      favBtn.addEventListener("click", function(e){
        e.preventDefault(); e.stopPropagation();
        var f = JSON.parse(localStorage.getItem("fif_favs") || "[]");
        var idx = f.indexOf(p.id);
        if (idx !== -1){ f.splice(idx, 1); favBtn.textContent = "♡"; favBtn.classList.remove("active"); }
        else            { f.push(p.id);    favBtn.textContent = "♥"; favBtn.classList.add("active"); }
        localStorage.setItem("fif_favs", JSON.stringify(f));
      });
      card.appendChild(favBtn);

      var iw = document.createElement("div"); iw.className = "prod-card__img";
      var im = document.createElement("img"); im.src = p.image; im.alt = p.name; im.loading = "lazy";
      iw.appendChild(im); card.appendChild(iw);

      var body = document.createElement("div"); body.className = "prod-card__body";

      var t = document.createElement("p"); t.className = "prod-card__title"; t.textContent = p.name; body.appendChild(t);
      var d = document.createElement("p"); d.className = "prod-card__desc";  d.textContent = p.description; body.appendChild(d);

      var pr = document.createElement("div"); pr.style.cssText = "display:flex;align-items:baseline;gap:6px;margin-top:4px;";
      var pe = document.createElement("span"); pe.style.cssText = "font-weight:600;font-size:.9rem;"; pe.textContent = formatPrice(p.price); pr.appendChild(pe);
      if (p.comparePrice) {
        var cp = document.createElement("span"); cp.style.cssText = "font-size:.72rem;color:var(--color-text-muted);text-decoration:line-through;";
        cp.textContent = formatPrice(p.comparePrice); pr.appendChild(cp);
      }
      body.appendChild(pr);

      var rr = document.createElement("div"); rr.style.cssText = "display:flex;align-items:center;gap:4px;margin-top:2px;";
      var ss = document.createElement("span"); ss.style.cssText = "color:var(--color-champagne);font-size:.78rem;"; ss.textContent = starsHTML(p.rating); rr.appendChild(ss);
      var rc = document.createElement("span"); rc.style.cssText = "font-size:.7rem;color:var(--color-text-muted);"; rc.textContent = "(" + p.reviews + ")"; rr.appendChild(rc);
      body.appendChild(rr);

      if (p.stock === 0) {
        var oos = document.createElement("span"); oos.style.cssText = "font-size:.72rem;color:#e05252;margin-top:2px;"; oos.textContent = "Out of stock"; body.appendChild(oos);
      } else if (p.stock <= 5) {
        var low = document.createElement("span"); low.style.cssText = "font-size:.72rem;color:#d97706;margin-top:2px;"; low.textContent = "Only " + p.stock + " left!"; body.appendChild(low);
      }

      card.appendChild(body);
      grid.appendChild(card);
    });
  }

  // ── Clear filters ────────────────────────────────────────────
  function clearFilters(){
    document.querySelectorAll(".price-filter").forEach(function(cb){ cb.checked = false; });
    document.querySelectorAll(".size-filter").forEach(function(cb){ cb.checked = false; });
    var allR = document.querySelector("input[name='rating-filter'][value='0']");
    if (allR) allR.checked = true;
    document.getElementById("search-input-cat").value = "";
    document.getElementById("sort-select").value = "recommended";
    applyFilters();
  }

  // ── Event listeners ──────────────────────────────────────────
  document.getElementById("search-input-cat").addEventListener("input", applyFilters);
  document.getElementById("sort-select").addEventListener("change", applyFilters);

  // ── Initial render ────────────────────────────────────────────
  applyFilters();

  // ── Recently viewed ───────────────────────────────────────────
  renderRecentlyViewed("rv-container");
  if (document.getElementById("rv-container").children.length > 0){
    document.getElementById("rv-section").style.display = "block";
  }

  injectFooter();
</script>
</body>
</html>
