<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Checkout — Fix-It Forward</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="products.js"></script>
  <script src="header.js"></script>
  <style>
    .checkout-wrap{max-width:960px;margin:0 auto;padding:32px 6vw 60px;display:grid;grid-template-columns:1fr 1fr;gap:32px;}
    .checkout-card{background:var(--color-surface);border:1px solid var(--color-border-subtle);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px;}
    .checkout-card h2{font-family:var(--font-display);font-size:1.2rem;color:var(--color-text);margin:0 0 18px;padding-bottom:12px;border-bottom:1px solid var(--color-border-subtle);}
    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    .form-group label{font-size:.78rem;color:var(--color-text-muted);}
    .form-group input,.form-group select{padding:10px 14px;border:1px solid var(--color-border-subtle);border-radius:var(--radius-md);font-family:var(--font-body);font-size:.88rem;color:var(--color-text);background:var(--color-marble);outline:none;transition:border-color .18s;}
    .form-group input:focus,.form-group select:focus{border-color:var(--color-champagne);}
    .form-group input.error{border-color:#e05252;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .pay-method{display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--color-border-subtle);border-radius:var(--radius-md);margin-bottom:10px;cursor:pointer;transition:border-color .18s,background .18s;}
    .pay-method:has(input:checked){border-color:var(--color-champagne);background:var(--color-primary-soft);}
    .pay-method input{accent-color:var(--color-champagne);}
    .order-item-line{display:flex;justify-content:space-between;font-size:.83rem;padding:8px 0;border-bottom:1px dashed var(--color-border-subtle);}
    .order-item-line:last-child{border-bottom:none;}
    .totals-row{display:flex;justify-content:space-between;font-size:.84rem;margin-bottom:7px;color:var(--color-text-muted);}
    .totals-row--total{font-size:1rem;font-weight:700;color:var(--color-text);margin-top:10px;padding-top:10px;border-top:1px solid var(--color-border-subtle);}
    @media(max-width:720px){.checkout-wrap{grid-template-columns:1fr;}.form-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<script>injectHeader("");</script>
<div style="background:var(--color-velvet);padding:20px 6vw;"><h1 style="font-family:var(--font-display);font-size:1.8rem;color:#fff;margin:0;">Checkout</h1></div>
<main>
  <div id="empty-warn" style="display:none;text-align:center;padding:60px 6vw;">
    <p style="font-size:2rem;margin-bottom:12px;">🛒</p>
    <p style="color:var(--color-text-muted);">Your bag is empty. <a href="index.html" style="color:var(--color-text);font-weight:600;">Shop now →</a></p>
  </div>
  <div class="checkout-wrap" id="checkout-content">
    <div>
      <div class="checkout-card">
        <h2>📋 Contact Details</h2>
        <div class="form-row">
          <div class="form-group"><label>First Name *</label><input id="fn" type="text" placeholder="Jane"/></div>
          <div class="form-group"><label>Last Name *</label><input id="ln" type="text" placeholder="Doe"/></div>
        </div>
        <div class="form-group"><label>Email *</label><input id="em" type="email" placeholder="jane@example.com"/></div>
        <div class="form-group"><label>Phone</label><input id="ph" type="tel" placeholder="+971 50 000 0000"/></div>
      </div>
      <div class="checkout-card">
        <h2>🚚 Shipping Address</h2>
        <div class="form-group"><label>Address *</label><input id="addr" type="text" placeholder="123 Main Street"/></div>
        <div class="form-row">
          <div class="form-group"><label>City *</label><input id="city" type="text" placeholder="Dubai"/></div>
          <div class="form-group"><label>ZIP / PO Box</label><input id="zip" type="text" placeholder="00000"/></div>
        </div>
        <div class="form-group"><label>Country *</label>
          <select id="country">
            <option value="">Select...</option>
            <option value="AE" selected>United Arab Emirates</option>
            <option value="SA">Saudi Arabia</option>
            <option value="US">United States</option>
            <option value="GB">United Kingdom</option>
            <option value="IN">India</option>
          </select>
        </div>
      </div>
      <div class="checkout-card">
        <h2>💳 Payment Method</h2>
        <div class="pay-method"><input type="radio" name="pay" id="p1" value="card" checked/><label for="p1">💳 Credit / Debit Card</label></div>
        <div class="pay-method"><input type="radio" name="pay" id="p2" value="paypal"/><label for="p2">🅿️ PayPal</label></div>
        <div class="pay-method"><input type="radio" name="pay" id="p3" value="apple"/><label for="p3">🍎 Apple Pay</label></div>
        <div class="pay-method"><input type="radio" name="pay" id="p4" value="cod"/><label for="p4">💵 Cash on Delivery</label></div>
        <p style="font-size:.72rem;color:var(--color-text-muted);margin-top:10px;">🔒 Demo store — no real payment processed.</p>
      </div>
    </div>
    <div>
      <div class="checkout-card" style="position:sticky;top:90px;">
        <h2>🧾 Order Summary</h2>
        <div id="order-items"></div>
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--color-border-subtle);">
          <div class="totals-row"><span>Subtotal</span><span id="sum-sub"></span></div>
          <div class="totals-row"><span>Shipping</span><span id="sum-ship"></span></div>
          <div class="totals-row"><span>Tax (5%)</span><span id="sum-tax"></span></div>
          <div class="totals-row totals-row--total"><span>Total</span><span id="sum-total"></span></div>
        </div>
        <button class="btn btn--primary btn--full" style="margin-top:20px;padding:14px;font-size:.9rem;" onclick="placeOrder()">Place Order 🎉</button>
        <p style="font-size:.72rem;color:var(--color-text-muted);text-align:center;margin-top:8px;">By placing your order you agree to our demo Terms of Service.</p>
      </div>
    </div>
  </div>
</main>
<script>
  var cartData = JSON.parse(localStorage.getItem("fif_cart")||"[]");
  if(!cartData.length){ document.getElementById("empty-warn").style.display="block"; document.getElementById("checkout-content").style.display="none"; }
  else {
    var itemsEl = document.getElementById("order-items");
    cartData.forEach(function(i){
      var d=document.createElement("div"); d.className="order-item-line";
      d.innerHTML='<span>'+i.name+(i.size?' ('+i.size+')':'')+'  &times; '+i.qty+'</span><span>'+formatPrice(i.price*i.qty)+'</span>';
      itemsEl.appendChild(d);
    });
    var sub=cartData.reduce(function(s,i){return s+i.price*i.qty;},0);
    var shipping=sub>=75?0:5.99, tax=sub*0.05, total=sub+tax+(sub>=75?0:5.99);
    document.getElementById("sum-sub").textContent  = formatPrice(sub);
    document.getElementById("sum-ship").textContent = sub>=75?"Free":formatPrice(5.99);
    document.getElementById("sum-tax").textContent  = formatPrice(tax);
    document.getElementById("sum-total").textContent= formatPrice(total);
  }
  function placeOrder(){
    var fields=[{id:"fn"},{id:"ln"},{id:"em"},{id:"addr"},{id:"city"},{id:"country"}];
    var ok=true;
    fields.forEach(function(f){ var el=document.getElementById(f.id); if(!el.value.trim()){el.classList.add("error");ok=false;}else el.classList.remove("error"); });
    if(!ok){ showToast("Please fill in all required fields","error"); return; }
    var orderId="FF-"+Math.random().toString(36).substring(2,8).toUpperCase();
    localStorage.setItem("fif_last_order",JSON.stringify({
      orderId:orderId, name:document.getElementById("fn").value.trim(),
      cart:cartData, total:document.getElementById("sum-total").textContent
    }));
    localStorage.removeItem("fif_cart");
    window.location.href="order-confirmation.html";
  }
  injectFooter();
</script>
</body>
</html>
